name: kartoucha_delivery
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Firebase core (required for all Firebase services)
  firebase_core: ^3.6.0

  url_launcher: ^6.3.0

  # Firebase Authentication (login/signup)
  firebase_auth: ^5.3.0

  # Cloud Firestore (database for orders, workers, offers)
  cloud_firestore: ^5.4.0

  # For location permission and maps
  geolocator: ^12.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^18.0.0

  # State management
  provider: ^6.1.2

  local_auth: ^2.3.0
  vibration: ^2.0.0
  shared_preferences: ^2.3.5

  # HTTP requests
  http: ^1.2.2
  timer_builder: ^2.0.0

  # Phone number formatting
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # 🔥 Your images are now correctly declared here:
  assets:
    - assets/images/